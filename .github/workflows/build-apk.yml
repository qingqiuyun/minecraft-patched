name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download apktool
      run: |
        wget https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O apktool.jar
        chmod +x apktool.jar

    - name: List files
      run: |
        echo "Current directory:"
        pwd
        ls -la
        echo "=== Checking decompiled_apk ==="
        ls -la decompiled_apk || echo "decompiled_apk not found"
        echo "=== Checking AndroidManifest.xml ==="
        ls -la decompiled_apk/AndroidManifest.xml || echo "AndroidManifest.xml not found"

    - name: Build APK
      run: |
        echo "Starting APK build..."
        java -jar apktool.jar b decompiled_apk -o patched.apk
        echo "Build completed"
        ls -la patched.apk || echo "APK file not found"

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: patched-apk
        path: patched.apk